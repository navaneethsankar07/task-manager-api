apiVersion: apps/v1
kind: Deployment

metadata:
  name: task-manager

spec:
  replicas: 2

  selector:
    matchLabels:
      app: task-manager

  template:
    metadata:
      labels:
        app: task-manager

    spec:
      containers:

        - name: django

          image: navaneethsankar7/task-manager-api:latest

          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: django-config

            - secretRef:
                name: postgres-secret
            
            - secretRef:
                name: django-secret

          command:
            - sh
            - -c
            - |
              python manage.py migrate &&
              python manage.py runserver 0.0.0.0:8000